<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Susurros de Tela - Catálogo Exclusivo</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600;1,700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        nude: {
                            50: '#fdfcfb',
                            100: '#f2eae4',
                            200: '#e5d9d0',
                            800: '#755c4d',
                            900: '#4a3b31',
                        },
                        dorado: {
                            DEFAULT: '#cda683',
                            hover: '#b38a66',
                        }
                    },
                    boxShadow: {
                        premium: '0 10px 40px -10px rgba(74, 59, 49, 0.1)',
                        'premium-hover': '0 20px 50px -15px rgba(74, 59, 49, 0.15)',
                        soft: '0 8px 25px rgba(205,166,131,0.18)',
                    }
                }
            }
        }
    </script>

    <style>
        * {
            transition: all 0.3s ease-out;
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(255,255,255,0.9), transparent 35%),
                linear-gradient(to bottom, #fdfcfb, #f8f3ef);
        }

        .animate-slide-in {
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        #img-zoom {
            max-height: 90vh;
            max-width: 90vw;
        }

        .glass-card {
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="text-nude-900 font-sans antialiased flex flex-col min-h-screen leading-relaxed">

<div class="sticky top-0 z-50 flex flex-col shadow-premium">

    <div id="contenedor-promos"
         class="bg-dorado text-white text-center py-1.5 md:py-2 px-2 md:px-4 text-xs md:text-sm font-medium tracking-wide hidden">
        ✨ <span id="texto-promo">Cargando promociones...</span> ✨
    </div>

    <header class="bg-nude-900 border-b-2 border-dorado relative">
        <div class="max-w-7xl mx-auto px-4 py-3.5 md:py-6 lg:py-8 flex justify-between md:justify-center items-center relative min-h-[60px] md:min-h-[100px]">

            <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-serif text-white tracking-wider text-left md:text-center md:w-full pr-3 md:px-20 lg:px-40 leading-tight font-bold italic flex-1">
                Susurros de Tela
            </h1>

            <button id="btn-abrir-carrito"
                    class="relative md:absolute right-0 md:right-8 bg-dorado text-white px-3.5 md:px-6 py-2 md:py-3 rounded-full font-bold hover:bg-white hover:text-dorado transition-all shadow-lg flex items-center gap-1.5 md:gap-3 text-xs md:text-base border-2 border-transparent hover:border-dorado flex-shrink-0">
                <span class="text-base md:text-xl">🛍️</span>
                <span class="hidden sm:inline font-medium">Mi Pedido</span>

                <span id="contador-carrito"
                      class="bg-white text-nude-900 rounded-full w-5 h-5 md:w-6 md:h-6 flex items-center justify-center text-[10px] md:text-sm font-bold shadow-inner">
                    0
                </span>
            </button>

        </div>
    </header>

</div>

<main class="max-w-[1500px] mx-auto p-4 md:p-6 mt-2 md:mt-4 mb-16 flex-1 w-full">

    <!-- NUESTRA ESENCIA -->
    <div id="seccion-identidad" class="max-w-4xl mx-auto mb-10 hidden">

        <div class="bg-gradient-to-br from-[#fffdfb] via-[#fcf7f2] to-[#f4e8de]
                    rounded-[32px]
                    border-2 border-[#ead8ca]
                    shadow-soft
                    relative
                    overflow-hidden">

            <div class="absolute inset-0 opacity-40 pointer-events-none">
                <div class="absolute -top-10 -left-10 w-40 h-40 bg-white rounded-full blur-3xl"></div>
                <div class="absolute bottom-0 right-0 w-52 h-52 bg-[#f7e9dd] rounded-full blur-3xl"></div>
            </div>

            <div class="relative z-10 p-7 md:p-12 text-center">

                <div class="flex justify-center mb-4">
                    <div class="w-16 h-[2px] bg-dorado rounded-full"></div>
                </div>

                <span class="text-[#dbc6b7] text-7xl leading-none font-serif absolute top-4 left-6 select-none">
                    "
                </span>

                <h2 class="text-2xl md:text-4xl font-serif text-nude-900 mb-5 font-semibold tracking-wide">
                    Nuestra Esencia
                </h2>

                <div id="texto-identidad"
                     class="relative overflow-hidden transition-all duration-700 ease-in-out
                            bg-white/70 glass-card
                            border border-[#ead8ca]
                            rounded-3xl
                            px-6 py-5
                            shadow-inner"
                     style="max-height: 110px;">

                    <p id="texto-identidad-contenido"
                       class="text-nude-800 font-light text-sm md:text-base leading-relaxed italic">
                    </p>

                    <div id="fade-identidad"
                         class="absolute bottom-0 left-0 w-full h-20
                                bg-gradient-to-t
                                from-[#fffaf6]
                                via-[#fffaf6]/90
                                to-transparent
                                pointer-events-none transition-opacity duration-300">
                    </div>

                </div>

                <button id="btn-toggle-identidad"
                        class="mt-6 mx-auto
                               bg-dorado hover:bg-dorado-hover
                               text-white
                               font-semibold
                               text-sm md:text-base
                               px-7 py-3
                               rounded-full
                               shadow-lg hover:shadow-xl
                               transition-all duration-300
                               inline-flex items-center justify-center gap-3
                               border border-white/40">

                    <span id="span-toggle-identidad">
                        ✨ Leer nuestra historia completa
                    </span>

                    <svg id="icono-toggle-identidad"
                         xmlns="http://www.w3.org/2000/svg"
                         class="h-5 w-5 transition-transform duration-300"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor">

                        <path stroke-linecap="round"
                              stroke-linejoin="round"
                              stroke-width="2.5"
                              d="M19 9l-7 7-7-7" />
                    </svg>

                </button>

            </div>

        </div>

    </div>

    <!-- BUSCADOR -->
    <div class="relative w-full max-w-2xl mx-auto mb-6 md:mb-8 mt-2">

        <input type="text"
               id="input-buscador"
               placeholder="Buscar... (ej: Queen, Funda floral)"
               class="w-full pl-10 md:pl-14 pr-4 md:pr-6 py-2 md:py-4 rounded-full border-2 border-nude-100 focus:outline-none focus:border-dorado focus:ring-4 focus:ring-dorado/10 shadow-sm md:shadow-premium text-nude-900 transition-all text-xs md:text-base placeholder:text-nude-800/50 placeholder:font-normal bg-white">

        <span class="absolute left-4 md:left-5 top-1/2 transform -translate-y-1/2 text-sm md:text-xl opacity-60">
            🔍
        </span>

    </div>

    <div id="contenedor-filtros"
         class="flex overflow-x-auto gap-2 md:gap-3 pb-3 md:pb-4 mb-4 md:mb-6 hide-scrollbar justify-start md:justify-center">
    </div>

    <div id="loader"
         class="text-center text-nude-800 py-12 font-medium animate-pulse text-sm md:text-lg">
        Preparando la colección exclusiva...
    </div>

    <div id="grilla-productos"
         class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-8">
    </div>

</main>

<script src="app.js"></script>

</body>
</html>
